<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>가계부</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8/dist/umd/supabase.min.js"></script>

<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  *::-webkit-scrollbar{display:none}
  *{-ms-overflow-style:none;scrollbar-width:none}

  :root{
    --bg:#fff;
    --gray50:#F9FAFB;
    --gray100:#F3F4F6;
    --gray200:#E5E7EB;
    --gray300:#D1D5DB;
    --gray400:#9CA3AF;
    --gray500:#6B7280;
    --gray600:#4B5563;
    --gray700:#374151;
    --gray800:#1F2937;
    --gray900:#111827;
    --indigo50:#EEF2FF;
    --indigo100:#E0E7FF;
    --indigo400:#818CF8;
    --indigo500:#6366F1;
    --indigo600:#4F46E5;
    --emerald400:#34D399;
    --emerald500:#10B981;
    --red400:#F87171;
    --red500:#EF4444;
    --amber500:#F59E0B;
    --font:'Noto Sans KR',sans-serif;

    /* ── Font Scale (Mobile-first) ── */
    /* Display: 메인 금액 (총자산, 당월지출 합계) */
    --fs-display:28px;  --fw-display:900;
    /* Heading 1: 헤더 타이틀, 바텀시트 제목 */
    --fs-h1:20px;       --fw-h1:700;
    /* Heading 2: 카드 소제목, 날짜 구분 */
    --fs-h2:17px;       --fw-h2:700;
    /* Body Main: 리스트 항목 명칭 */
    --fs-body:15px;     --fw-body:400;
    /* Body Sub: 계좌명, 메모, 보조설명 */
    --fs-sub:13px;      --fw-sub:400;
    /* Amount: 내역 리스트 금액 */
    --fs-amt:15px;      --fw-amt:500;
    /* Caption: 태그, 날짜, 보조정보 */
    --fs-caption:12px;  --fw-caption:500;
    /* Micro: 탭바 레이블, 작은 뱃지 */
    --fs-micro:10px;    --fw-micro:500;

    /* ── Web overrides (min-width:600px) ── */
  }

  @media(min-width:600px){
    :root{
      --fs-display:32px;
      --fs-h1:24px;
      --fs-h2:18px;
      --fs-body:16px;
      --fs-sub:14px;
      --fs-amt:16px;
      --fs-caption:14px;
      --fs-micro:12px;
    }
  }

  body{
    background:#F3F4F6;
    font-family:var(--font);
    color:var(--gray900);
    display:flex;
    justify-content:center;
    min-height:100vh;
  }

  #app{
    width:100%;
    max-width:480px;
    background:#fff;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    position:relative;
    box-shadow:0 0 40px rgba(0,0,0,.08);
  }

  @media(min-width:600px){
    #app{max-width:1024px;flex-direction:row}
    #sidebar{
      display:flex;flex-direction:column;
      width:220px;min-width:220px;
      background:#fff;border-right:1px solid var(--gray100);
      padding:24px 0;position:sticky;top:0;height:100vh;
      overflow-y:auto;
    }
    #sidebar .sidebar-logo{
      font-size:20px;font-weight:700;color:var(--gray900);
      padding:0 24px 24px;border-bottom:1px solid var(--gray100);
      margin-bottom:12px;
    }
    #sidebar .sidebar-btn{
      display:flex;align-items:center;gap:12px;
      padding:12px 24px;border:none;background:transparent;
      cursor:pointer;color:var(--gray500);font-size:15px;
      font-weight:500;width:100%;text-align:left;
      transition:all .15s;border-radius:0;
    }
    #sidebar .sidebar-btn:hover{background:var(--gray50);color:var(--gray900)}
    #sidebar .sidebar-btn.active{
      color:var(--indigo600);background:var(--indigo50);
      font-weight:700;
    }
    #main-content{flex:1;overflow-y:auto;min-height:100vh;max-width:none;width:100%;}
    #main-content .content{max-width:none;width:100%;}
    #main-content #header-slot > *{max-width:none;}
    .bottom-nav{display:none!important}
    .fab-wrap{left:auto;right:0;transform:none;max-width:none;width:calc(1024px - 220px);}
  }

  /* Header */
  .header{
    position:sticky;
    top:0;
    background:#fff;
    z-index:30;
    border-bottom:1px solid var(--gray100);
  }
  .header-top{
    padding:16px 20px 8px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .month-nav{display:flex;align-items:center;gap:12px}
  .month-nav button{
    width:32px;height:32px;border-radius:50%;border:none;
    background:transparent;cursor:pointer;display:flex;
    align-items:center;justify-content:center;
    transition:background .15s;
  }
  .month-nav button:hover{background:var(--gray100)}
  .month-nav button:disabled{opacity:.2;cursor:not-allowed}
  .month-label{
    font-size:var(--fs-body);font-weight:var(--fw-h1);cursor:pointer;
    display:flex;align-items:center;gap:4px;
  }
  .month-label:hover{opacity:.7}
  .btn-this-month{
    font-size:var(--fs-caption);font-weight:var(--fw-h1);
    padding:6px 12px;border-radius:20px;
    background:var(--gray100);color:var(--gray500);
    border:none;cursor:pointer;transition:all .15s;
  }
  .btn-this-month:hover{background:var(--gray200)}
  .btn-this-month.period-mode{background:#FEE2E2;color:#EF4444}

  /* Ledger header extras */
  .ledger-header{padding:0 20px 12px;display:flex;flex-direction:column;gap:10px}
  .search-row{display:flex;gap:8px;align-items:center}
  .search-wrap{position:relative;flex:1}
  .search-wrap input{
    width:100%;background:var(--gray50);border:none;
    border-radius:12px;padding:8px 14px 8px 36px;
    font-size:var(--fs-caption);font-weight:var(--fw-caption);font-family:var(--font);
    outline:none;transition:box-shadow .15s;
  }
  .search-wrap input:focus{box-shadow:0 0 0 2px var(--indigo100)}
  .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--gray400)}
  .btn-calendar-filter{
    width:34px;height:34px;border-radius:12px;
    border:none;cursor:pointer;display:flex;
    align-items:center;justify-content:center;
    background:var(--gray50);color:var(--gray400);
    transition:all .15s;
  }
  .btn-calendar-filter.active{background:var(--indigo600);color:#fff;box-shadow:0 4px 12px rgba(79,70,229,.3)}
  .filter-row{display:flex;align-items:center;justify-content:space-between}
  .filter-pills{display:flex;gap:8px;overflow-x:auto}
  .pill{
    padding:4px 12px;border-radius:20px;
    font-size:var(--fs-micro);font-weight:700;
    border:none;cursor:pointer;
    white-space:nowrap;transition:all .15s;
    background:var(--gray100);color:var(--gray400);
  }
  .pill.active{background:var(--indigo600);color:#fff;box-shadow:0 4px 8px rgba(79,70,229,.2)}
  .filter-sum{font-size:var(--fs-micro);font-weight:var(--fw-micro);color:var(--gray400)}

  /* Content area */
  .content{flex:1;overflow-y:auto;padding-bottom:80px}

  /* Bottom Nav */
  .bottom-nav{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%);
    width:100%;max-width:480px;
    background:#fff;border-top:1px solid var(--gray100);
    padding:10px 8px;display:flex;justify-content:space-around;
    align-items:center;z-index:30;
  }
  @media(min-width:600px){.bottom-nav{display:none!important}}
  .nav-btn{
    display:flex;flex-direction:column;align-items:center;gap:3px;
    border:none;background:transparent;cursor:pointer;
    color:var(--gray400);transition:color .15s;padding:4px 8px;
  }
  .nav-btn.active{color:var(--indigo600)}
  .nav-btn span{font-size:var(--fs-micro);font-weight:var(--fw-micro)}
  .nav-btn.active span{font-weight:var(--fw-h2)}
  .nav-dot{ display:none; }

  /* FAB */
  .fab-wrap{
    position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
    width:100%;max-width:480px;pointer-events:none;z-index:20;
  }
  @media(min-width:600px){.fab-wrap{max-width:none;width:100%;}}
  .fab-inner{
    position:absolute;right:20px;bottom:0;
    display:flex;flex-direction:column;align-items:flex-end;gap:10px;
    pointer-events:auto;
  }
  .fab-main{
    width:56px;height:56px;border-radius:50%;
    background:var(--indigo600);color:#fff;
    border:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 24px rgba(79,70,229,.35);
    transition:all .25s;
  }
  .fab-main.open{background:var(--gray800);transform:rotate(45deg)}
  .fab-mini{
    background:#fff;border:1px solid var(--gray100);
    padding:8px 16px;border-radius:12px;
    font-size:var(--fs-caption);font-weight:var(--fw-h1);color:var(--gray700);
    cursor:pointer;display:flex;align-items:center;gap:6px;
    box-shadow:0 4px 16px rgba(0,0,0,.08);
    animation:slideUp .2s ease;
    border:none;
  }
  .fab-mini.tx{background:var(--indigo600);color:#fff;box-shadow:0 4px 16px rgba(79,70,229,.3)}
  @keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  /* Cards / Sections */
  .section{padding:12px 20px;display:flex;flex-direction:column;gap:20px}
  .card{
    background:#fff;border:1px solid var(--gray100);
    border-radius:24px;padding:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.03);
  }
  .card-title{
    font-size:var(--fs-micro);font-weight:700;color:var(--gray400);
    text-transform:uppercase;letter-spacing:.06em;margin-bottom:16px;
  }

  /* Budget Card */
  .budget-card{
    border-radius:28px;padding:20px;color:#fff;
    background:var(--indigo600);
    box-shadow:0 8px 24px rgba(79,70,229,.2);
    cursor:pointer;user-select:none;
  }
  .budget-card.over{background:#EF4444;box-shadow:0 8px 24px rgba(239,68,68,.2)}
  .budget-label{font-size:var(--fs-micro);font-weight:700;opacity:.8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
  .budget-amount{font-size:var(--fs-display);font-weight:var(--fw-display);display:flex;align-items:baseline;gap:4px}
  .budget-amount span{font-size:var(--fs-sub);font-weight:var(--fw-amt);opacity:.9}
  .progress-bar{width:100%;height:6px;background:rgba(255,255,255,.15);border-radius:3px;overflow:hidden;margin:12px 0 6px}
  .progress-fill{height:100%;border-radius:3px;background:rgba(255,255,255,.4);transition:width .5s ease}
  .progress-info{display:flex;justify-content:space-between;font-size:var(--fs-micro);font-weight:700;opacity:.8}

  /* Status Row in budget card */
  .status-row{display:flex;flex-direction:column;gap:4px;text-align:right}
  .status-item{display:flex;justify-content:flex-end;align-items:center;gap:8px}
  .status-label{font-size:var(--fs-micro);opacity:.6}
  .status-val{font-size:var(--fs-caption);font-weight:var(--fw-h1)}
  @media(max-width:480px){.status-row{display:none}}

  /* Calendar */
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:0 0;text-align:center}
  .cal-dow{font-size:var(--fs-micro);font-weight:700;color:var(--gray300);padding:4px 0 8px}
  .cal-day-btn{
    display:flex;flex-direction:column;align-items:center;gap:2px;
    padding:2px;border:none;background:transparent;cursor:pointer;
  }
  .cal-num{
    font-size:var(--fs-caption);font-weight:700;
    width:30px;height:30px;
    display:flex;align-items:center;justify-content:center;
    border-radius:50%;color:var(--gray700);
    transition:all .15s;
  }
  .cal-num:hover{background:var(--gray50)}
  .cal-num.today{background:var(--indigo50);color:var(--indigo600)}
  .cal-num.selected{background:var(--indigo600);color:#fff;box-shadow:0 4px 8px rgba(79,70,229,.25)}
  .cal-dots{display:flex;gap:2px;height:4px;justify-content:center}
  .dot{width:4px;height:4px;border-radius:50%}

  /* Transaction List */
  .day-group{padding:20px 20px 0}
  .day-header{
    display:flex;align-items:flex-end;justify-content:space-between;
    margin-bottom:16px;
  }
  .day-num{font-size:var(--fs-h1);font-weight:var(--fw-display);color:var(--gray800)}
  .day-num.today{color:var(--indigo600)}
  .day-name-wrap{display:flex;flex-direction:column;margin-bottom:2px;margin-left:8px}
  .day-today-label{font-size:var(--fs-micro);font-weight:var(--fw-display);color:var(--indigo500);text-transform:uppercase;letter-spacing:-.02em}
  .day-name{font-size:var(--fs-caption);font-weight:var(--fw-h1);color:var(--gray400)}
  .day-totals{display:flex;gap:8px;align-items:center;font-size:var(--fs-sub);font-weight:var(--fw-h1)}
  .divider{height:1px;background:var(--gray50);margin:20px 20px 0}

  /* Transaction item */
  .tx-item{
    display:flex;align-items:center;justify-content:space-between;
    padding:4px;margin:-4px;border-radius:12px;
    cursor:pointer;transition:background .1s;
  }
  .tx-item:hover{background:rgba(0,0,0,.02)}
  .tx-item.selected{background:var(--indigo50)}
  .tx-left{display:flex;align-items:center;gap:14px}
  .tx-icon{
    width:44px;height:44px;border-radius:16px;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .tx-info{display:flex;flex-direction:column;gap:3px}
  .tx-name{font-size:var(--fs-sub);font-weight:var(--fw-h1);color:var(--gray800);display:flex;align-items:center;gap:6px}
  .tx-card-badge{font-size:var(--fs-micro);font-weight:700;color:var(--indigo400);background:var(--indigo50);padding:1px 5px;border-radius:4px}
  .tx-meta{font-size:var(--fs-caption);color:var(--gray400);font-weight:var(--fw-caption)}
  .tx-memo{
    display:flex;align-items:center;gap:4px;
    font-size:var(--fs-micro);color:var(--indigo400);font-weight:700;margin-top:1px;
  }
  .tx-memo::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--indigo400)}
  .tx-amount{text-align:right}
  .tx-amt{font-size:var(--fs-amt);font-weight:var(--fw-h1)}
  .tx-amt.expense{color:var(--gray800)}
  .tx-amt.income{color:var(--emerald500)}
  .tx-won{font-size:var(--fs-caption);font-weight:var(--fw-h1)}
  .tx-won.expense{color:var(--gray400)}
  .tx-won.income{color:var(--emerald400)}
  .tx-list{display:flex;flex-direction:column;gap:20px}

  /* Day memo */
  .day-memo-row{
    display:flex;align-items:center;gap:8px;
    padding:10px 12px;background:rgba(99,102,241,.05);
    border-radius:12px;border:1px solid rgba(99,102,241,.08);
    margin-bottom:16px;cursor:pointer;
  }
  .day-memo-text{font-size:var(--fs-caption);color:var(--indigo600);font-weight:var(--fw-h1);flex:1}

  /* Modals */
  .overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.4);
    backdrop-filter:blur(2px);z-index:40;
    animation:fadeIn .2s ease;
  }
  .sheet{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%);
    width:100%;max-width:480px;
    background:#fff;border-radius:32px 32px 0 0;
    z-index:50;padding:24px 24px 40px;
    max-height:92vh;overflow-y:auto;
    animation:slideUp2 .3s cubic-bezier(.32,.72,0,1);
  }
  @media(min-width:600px){.sheet{max-width:800px}}
  .sheet-center{
    position:fixed;top:50%;left:50%;
    transform:translate(-50%,-50%);
    width:320px;background:#fff;
    border-radius:28px;z-index:70;padding:24px;
    animation:popIn .25s ease;
  }
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideUp2{from{transform:translateX(-50%) translateY(100%)}to{transform:translateX(-50%) translateY(0)}}
  @keyframes popIn{from{opacity:0;transform:translate(-50%,-50%) scale(.9)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
  .sheet-handle{
    width:48px;height:6px;background:var(--gray100);
    border-radius:3px;margin:0 auto 24px;
  }
  .sheet-title{font-size:var(--fs-h1);font-weight:var(--fw-h1);margin-bottom:24px}
  .sheet-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
  .btn-close{font-size:var(--fs-sub);font-weight:var(--fw-h1);color:var(--gray400);background:none;border:none;cursor:pointer}

  /* Form elements */
  .form-group{display:flex;flex-direction:column;gap:8px}
  .form-label{font-size:var(--fs-micro);font-weight:700;color:var(--gray400);text-transform:uppercase;letter-spacing:.06em}
  .form-input{
    width:100%;background:var(--gray50);border:none;
    border-radius:16px;padding:12px 16px;
    font-size:var(--fs-sub);font-weight:var(--fw-h1);font-family:var(--font);
    outline:none;transition:box-shadow .15s;
    -webkit-appearance:none;appearance:none;
  }
  .form-input:focus{box-shadow:0 0 0 2px var(--indigo100)}
  .form-input.amount{font-size:var(--fs-h1);color:var(--indigo600);padding-right:40px}
  .amount-wrap{position:relative}
  .amount-won{
    position:absolute;right:16px;top:50%;
    transform:translateY(-50%);
    font-size:var(--fs-body);font-weight:var(--fw-h1);color:var(--gray300);
  }
  .form-select{
    width:100%;background:var(--gray50);border:none;
    border-radius:16px;padding:12px 16px;
    font-size:var(--fs-sub);font-weight:var(--fw-h1);font-family:var(--font);
    outline:none;-webkit-appearance:none;appearance:none;
    cursor:pointer;
  }
  .form-select:focus{box-shadow:0 0 0 2px var(--indigo100)}
  .form-textarea{
    width:100%;background:var(--gray50);border:none;
    border-radius:16px;padding:12px 16px;
    font-size:var(--fs-sub);font-weight:var(--fw-h1);font-family:var(--font);
    outline:none;resize:none;
  }
  .form-grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}

  /* Type pills */
  .type-pills{display:flex;gap:8px}
  .type-pill{
    flex:1;padding:12px;border-radius:16px;
    font-size:var(--fs-sub);font-weight:var(--fw-h1);border:none;
    cursor:pointer;background:var(--gray50);
    color:var(--gray400);transition:all .15s;
  }
  .type-pill.active{
    background:var(--indigo600);color:#fff;
    box-shadow:0 6px 16px rgba(79,70,229,.25);
  }

  /* Segment control */
  .segment{
    display:flex;background:var(--gray100);
    border-radius:16px;padding:4px;
  }
  .seg-btn{
    flex:1;padding:10px;text-align:center;
    font-size:var(--fs-caption);font-weight:var(--fw-h1);
    border:none;cursor:pointer;
    background:transparent;color:var(--gray400);
    border-radius:12px;transition:all .15s;
  }
  .seg-btn.active{
    background:#fff;color:var(--indigo600);
    box-shadow:0 2px 6px rgba(0,0,0,.06);
  }

  /* Stats */
  .flow-bar{
    height:12px;background:var(--gray100);
    border-radius:6px;overflow:hidden;
    display:flex;margin:12px 0 16px;
  }
  .flow-seg{height:100%;transition:width .5s ease}
  .flow-legend{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;text-align:center}
  .legend-label{font-size:var(--fs-micro);font-weight:700;color:var(--gray400);margin-bottom:2px}
  .legend-val{font-size:var(--fs-caption);font-weight:var(--fw-display)}

  /* Asset cards */
  .total-asset-card{
    padding:24px;border-radius:28px;
    background:linear-gradient(135deg,#4F46E5 0%,#3730A3 100%);
    color:#fff;
    box-shadow:0 12px 32px rgba(79,70,229,.28);
  }
  .total-label{font-size:var(--fs-micro);font-weight:700;opacity:.5;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
  .total-amount{font-size:var(--fs-display);font-weight:var(--fw-display)}
  .total-won{font-size:var(--fs-sub);font-weight:var(--fw-amt);opacity:.7;margin-left:4px}

  .saving-item{border-left:2px solid transparent;padding-left:12px}
  .saving-item.expired{border-left-color:#EF4444}

  /* Progress */
  .prog-bar{
    height:6px;background:var(--gray50);
    border-radius:3px;overflow:hidden;
  }
  .prog-fill{height:100%;border-radius:3px;transition:width .5s ease}

  /* D-day badge */
  .dday{
    font-size:var(--fs-micro);font-weight:700;
    padding:2px 8px;border-radius:20px;border:1px solid;
  }

  /* Buttons */
  .btn-primary{

// ===== HELPERS =====
function fmt(n){return Number(n).toLocaleString('ko-KR')}
function getcat(id){return CATEGORIES.find(c=>c.id===id)}
function getacc(id){return ACCOUNTS.find(a=>a.id===id)}

// monthStartDay 기준으로 해당 "달"의 시작일/종료일 문자열(YYYY-MM-DD) 반환
function getPeriodRange(year, month){
  const day = state.monthStartDay || 1;
  if(day === 1){
    const start = `${year}-${String(month).padStart(2,'0')}-01`;
    const lastDay = new Date(year, month, 0).getDate();
    const end = `${year}-${String(month).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;
    return {start, end};
  }
  // 예: day=25, year=2026, month=3 → 2026-02-25 ~ 2026-03-24
  const startDate = new Date(year, month-2, day); // 전달의 day일
  const endDate = new Date(year, month-1, day-1); // 이달의 (day-1)일
  function toStr(d){
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  return {start: toStr(startDate), end: toStr(endDate)};
}

/**
 * luIcon(name, size)
 * UI 전용 (내비, 버튼 등 배경 없는 단독 아이콘) — stroke-width 1.5
 */
function luIcon(name, size=20){
  const s = size;
  const paths = ICON_MAP[name] || ICON_MAP['more-horizontal'];
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">${paths}</svg>`;
}

/**
 * appIcon(catId, size, radius)
 * ─────────────────────────────────────────────────
 * 앱 전역 공통 카테고리 아이콘 컴포넌트.
 * catId 하나만 넘기면 색상·아이콘·배경이 자동으로 결정된다.
 *
 * size   : 박스 px (기본 40 — 설정/홈 리스트)
 * radius : border-radius px (기본 14)
 *
 * 톤온톤: 배경 = color + '1a' (10%), 아이콘 = color (100%)
 */
function appIcon(catId, size=40, radius=14){
  const c     = getcat(catId);
  const color = c ? c.color : '#C9C9C9';
  const icon  = c ? c.icon  : 'more-horizontal';
  const paths = ICON_MAP[icon] || ICON_MAP['more-horizontal'];
  const s     = Math.round(size * 0.45); // 아이콘은 박스의 45%
  const bg    = color + '1a';
  const svg   = `<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">${paths}</svg>`;
  return `<div style="width:${size}px;height:${size}px;border-radius:${radius}px;display:flex;align-items:center;justify-content:center;background:${bg};color:${color};flex-shrink:0">${svg}</div>`;
}

/**
 * settingsIcon(iconName, color)
 * 설정 탭 전용 — catId 없이 iconName + color를 직접 지정할 때 사용.
 * (계정관리, 한달시작일 등 카테고리 매핑이 없는 UI 아이콘)
 */
function settingsIcon(iconName, color){
  const bg    = color + '1a';
  const paths = ICON_MAP[iconName] || ICON_MAP['more-horizontal'];
  const svg   = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">${paths}</svg>`;
  return `<div style="width:40px;height:40px;border-radius:14px;display:flex;align-items:center;justify-content:center;background:${bg};color:${color};flex-shrink:0">${svg}</div>`;
}

// getCategoryIcon은 이하 하위호환용 — 내부에서 appIcon과 동일한 SVG를 반환
function getCategoryIcon(catId){
  const c     = getcat(catId);
  const icon  = c ? c.icon : 'more-horizontal';
  const paths = ICON_MAP[icon] || ICON_MAP['more-horizontal'];
  return `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">${paths}</svg>`;
}


function accountBalances(){
  const b = {};
  ACCOUNTS.forEach(a=>b[a.id]=a.balance);
  TRANSACTIONS.forEach(t=>{
    if(t.category==='transfer'){
      if(b[t.accountId]!==undefined) b[t.accountId]+=t.amount;
      if(t.toAccountId&&b[t.toAccountId]!==undefined) b[t.toAccountId]-=t.amount;
    } else {
      if(b[t.accountId]!==undefined) b[t.accountId]+=t.amount;
    }
  });
  return b;
}

function getFilteredTx(){
  let txs = TRANSACTIONS;
  if(state.isPeriodMode&&state.periodStart&&state.periodEnd){
    txs = txs.filter(t=>t.date>=state.periodStart&&t.date<=state.periodEnd);
  } else {
    const {start, end} = getPeriodRange(state.year, state.month);
    txs = txs.filter(t=>t.date>=start&&t.date<=end);
  }
  return txs;
}

function getTotals(txs){
  const income = txs.filter(t=>t.amount>0).reduce((s,t)=>s+t.amount,0);
  const expense = txs.filter(t=>t.amount<0&&t.category!=='transfer').reduce((s,t)=>s+Math.abs(t.amount),0);
  return {income,expense};
}

function getBudget(){
  const ym=`${state.year}-${String(state.month).padStart(2,'0')}`;
  return state.monthlyBudgets[ym]!==undefined ? state.monthlyBudgets[ym] : state.defaultAllowance;
}

function getDday(dateStr){
  const diff = Math.ceil((new Date(dateStr)-new Date(todayStr))/(86400000));
  if(diff>0) return `D-${diff}`;
  if(diff===0) return 'D-Day';
  return '만기완료';
}
function getDdayColor(dateStr){
  const diff = Math.ceil((new Date(dateStr)-new Date(todayStr))/(86400000));
  if(diff<0) return '#EF4444';
  if(diff<30) return '#F4A96A';
  return '#4ECDC4';
}

function showToast(msg){
  const t = document.createElement('div');
  t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2000);
}

function renderTxIcon(catId, size=44, radius=16){
  return appIcon(catId, size, radius);
}

function renderTxItem(t, showCheckbox=false){
  const c = getcat(t.category);
  const acc = getacc(t.accountId);
  const isExp = t.amount<0 && t.category!=='transfer';
  const isTransfer = t.category==='transfer';
  const amtCls = t.amount>0 ? 'income' : 'expense';
  const isSelected = state.selectedIds.includes(t.id);
  
  let metaText = '';
  if(isTransfer){
    const toAcc = getacc(t.toAccountId);
    metaText = `${acc?.name||''} › ${toAcc?.name||''}`;
  } else {
    metaText = `${c?.name||''} · ${acc?.name||''}`;
  }
  
  const memoHtml = t.memo ? `<div class="tx-memo">${t.memo}</div>` : '';
  const cardBadge = t.isCard ? `<span class="tx-card-badge">💳 카드</span>` : '';
  const fixedBadge = t.autoFixed ? `<span class="tx-card-badge" style="background:#EEF2FF;color:var(--indigo600)">📌 고정</span>` : '';
  const checkHtml = showCheckbox ? `<div style="width:20px;height:20px;border-radius:50%;border:2px solid ${isSelected?'var(--indigo600)':'var(--gray200)'};background:${isSelected?'var(--indigo600)':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0">${isSelected?'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>':''}</div>` : '';
  
  return `<div class="tx-item${isSelected?' selected':''}" onclick="onTxClick(${t.id})" oncontextmenu="onTxLongPress(event,${t.id})">
    <div class="tx-left">
      ${checkHtml}
      ${renderTxIcon(t.category)}
      <div class="tx-info">
        <div class="tx-name">${t.desc}${cardBadge}${fixedBadge}</div>
        <div class="tx-meta">${metaText}</div>
        ${memoHtml}
      </div>
    </div>
    <div class="tx-amount">
      <span class="tx-amt ${amtCls}">${fmt(t.amount)}</span><span class="tx-won ${amtCls}">원</span>
    </div>
  </div>`;
}

function renderHeader(){
  const el = document.getElementById('header-slot');
  const t = state.tab;
  
  if(t==='assets'||t==='settings'){
    el.innerHTML='';
    return;
  }
  
  const {start:pStart} = getPeriodRange(state.year, state.month);
  const isFuture = pStart > todayStr;
  const txs = getFilteredTx();
  const {income,expense} = getTotals(txs);
  
  let topHtml = `<div class="header-top">
    <div class="month-nav">`;
  
  if(!state.isPeriodMode){
    const pRange = getPeriodRange(state.year, state.month);
    const day = state.monthStartDay||1;
    const periodLabel = day===1 ? `${state.year}년 ${state.month}월` : `${pRange.start.slice(2).replace(/-/g,'.')}~${pRange.end.slice(2).replace(/-/g,'.')}`;
    topHtml += `
      <button onclick="prevMonth()" title="이전달">${luIcon('chevron-left',20)}</button>
      <div class="month-label" onclick="showDatePicker()">${periodLabel}</div>
      <button onclick="nextMonth()" ${isFuture?'disabled':''} title="다음달">${luIcon('chevron-right',20)}</button>`;
  } else {
    topHtml += `<div class="period-badge">${luIcon('chevron-left',14)}<span>${(state.periodStart||'').slice(2).replace(/-/g,'.')}</span><span>~</span><span>${(state.periodEnd||'').slice(2).replace(/-/g,'.')}</span>${luIcon('chevron-right',14)}</div>`;
  }
  
  topHtml += `</div>
    <button class="btn-this-month ${state.isPeriodMode?'period-mode':''}" onclick="resetPeriod()">
      ${state.isPeriodMode?'해제':'이번달'}
    </button>
  </div>`;
  
  let ledgerExtras = '';
  if(t==='ledger'){
    const sumHtml = state.filterType==='transfer'
      ? ''
      : state.filterType==='all'
        ? `<span style="color:var(--emerald500)">+${fmt(income)}</span> <span style="color:var(--red400)">-${fmt(expense)}</span>`
        : state.filterType==='income' ? `+${fmt(income)}원` : `-${fmt(expense)}원`;
    
    ledgerExtras = `<div class="ledger-header">
      <div class="search-row">
        <div class="search-wrap">
          <span class="search-icon">${luIcon('search',16)}</span>
          <input type="text" placeholder="@거래처 #태그 검색" value="${state.searchQuery}" oninput="onSearch(this.value)">
        </div>
        <button class="btn-calendar-filter ${state.isPeriodMode?'active':''}" onclick="showPeriodModal()" title="기간 설정">${luIcon('calendar',16)}</button>
      </div>
      <div class="filter-row">
        <div class="filter-pills">
          ${['all','income','expense','transfer'].map(f=>`<button class="pill ${state.filterType===f?'active':''}" onclick="setFilter('${f}')">${f==='all'?'전체':f==='income'?'수입':f==='expense'?'지출':'이체'}</button>`).join('')}
        </div>
        <div class="filter-sum">${sumHtml}</div>
      </div>
    </div>`;
  }
  
  el.innerHTML = `<header class="header">${topHtml}${ledgerExtras}</header>`;
}

    {id:'statistics',name:'통계',icon:'pie-chart'},
    {id:'assets',name:'자산',icon:'wallet'},
    {id:'settings',name:'설정',icon:'settings'},

  document.getElementById('bottom-nav').innerHTML = tabs.map(tab=>`
    <button class="nav-btn ${state.tab===tab.id?'active':''}" onclick="switchTab('${tab.id}')">
      <div style="position:relative">
        ${luIcon(tab.icon, 22)}
        ${state.tab===tab.id?'<div class="nav-dot"></div>':''}

  // 사이드바 렌더링 (데스크탑)

  wrap.style.display = show ? 'block' : 'none';

  btn.className = 'fab-main' + (state.fabOpen?' open':'');
  
  const menus = document.getElementById('fab-menus');
  if(state.fabOpen){
    menus.style.display='flex';
    menus.innerHTML = `
      <button class="fab-mini" onclick="openMemoModal()">✨ 메모</button>
      <button class="fab-mini tx" onclick="openAddModal()">+ 거래</button>`;
  } else {
    menus.style.display='none';
    menus.innerHTML='';
  }
}

function renderContent(){
  const el = document.getElementById('content');
  if(state.tab==='home') el.innerHTML = renderHome();
  else if(state.tab==='ledger') el.innerHTML = renderLedger();
  else if(state.tab==='statistics') el.innerHTML = renderStatistics();
  else if(state.tab==='assets') el.innerHTML = renderAssets();
  else if(state.tab==='settings') el.innerHTML = renderSettings();
  
  // render charts after DOM update
  setTimeout(()=>{
    if(state.tab==='statistics') renderCharts();
    if(state.tab==='assets') renderAssetCharts();
  },50);
}

// ===== LEDGER TAB =====
function renderLedger(){
  let txs = getFilteredTx();
  
  // search filter
  if(state.searchQuery){
    const q = state.searchQuery;
    if(q.startsWith('@')){
      const kw=q.slice(1).toLowerCase();
      txs=txs.filter(t=>t.desc.toLowerCase().includes(kw));
    } else if(q.startsWith('#')){
      const kw=q.slice(1).toLowerCase();
      txs=txs.filter(t=>(t.tags||[]).some(tag=>tag.toLowerCase().includes(kw)));
    } else {
      const kw=q.toLowerCase();
      txs=txs.filter(t=>t.desc.toLowerCase().includes(kw)||(t.memo||'').toLowerCase().includes(kw)||(t.tags||[]).some(tag=>tag.toLowerCase().includes(kw)));
    }
  }
  
  // type filter
  txs = txs.filter(t=>{
    if(state.filterType==='all') return true;
    if(state.filterType==='income') return t.amount>0;
    if(state.filterType==='expense') return t.amount<0&&t.category!=='transfer';
    if(state.filterType==='transfer') return t.category==='transfer';
    return true;
  });
  
  // group by date
  const grouped = {};
  txs.forEach(t=>{
    if(!grouped[t.date]) grouped[t.date]=[];
    grouped[t.date].push(t);
  });
  // add memo-only dates (이체 필터일 때는 제외 — 이체 내역이 없는 날은 표시 불필요)
  const ym=`${state.year}-${String(state.month).padStart(2,'0')}`;
  if(state.filterType!=='transfer'){
    Object.keys(DAY_MEMOS).filter(d=>d.startsWith(ym)&&!grouped[d]).forEach(d=>grouped[d]=[]);
  }
  
  const sortedDates = Object.keys(grouped).sort((a,b)=>b.localeCompare(a));
  
  if(sortedDates.length===0){
    const emptyMsg = state.filterType==='transfer'
      ? `<div class="empty" style="display:flex;flex-direction:column;align-items:center;gap:8px;padding:60px 20px">
           <span style="font-size:32px">↔️</span>
           <span style="font-size:var(--fs-body);font-weight:var(--fw-h1);color:var(--gray400)">이체 내역이 없어요</span>
           <span style="font-size:var(--fs-sub);color:var(--gray300)">이번 달 이체 거래가 없습니다</span>
         </div>`
      : `<div class="empty">내역이 없습니다.</div>`;
    return emptyMsg;
  }
  
  let html = '';
  sortedDates.forEach((date,idx)=>{
    const dTxs = grouped[date];
    const d = new Date(date);
    const dayName=['일','월','화','수','목','금','토'][d.getDay()];
    const isToday = date===todayStr;
    const dayExp = dTxs.filter(t=>t.amount<0&&t.category!=='transfer').reduce((s,t)=>s+t.amount,0);
    const dayInc = dTxs.filter(t=>t.amount>0).reduce((s,t)=>s+t.amount,0);
    const memo = DAY_MEMOS[date];
    
    html += `<div class="day-group">
      <div class="day-header">
        <div style="display:flex;align-items:flex-end">
          <span class="day-num${isToday?' today':''}">${String(d.getDate()).padStart(2,'0')}</span>
          <div class="day-name-wrap">
            ${isToday?'<span class="day-today-label">TODAY</span>':''}
            <span class="day-name">${dayName}요일</span>
          </div>
        </div>
        <div class="day-totals">
          ${dayInc>0?`<span style="color:var(--emerald500)">+${fmt(dayInc)}</span>`:''}
          ${dayInc>0&&dayExp<0?'<span style="color:var(--gray200)">/</span>':''}
          ${dayExp<0?`<span style="color:var(--red400)">-${fmt(Math.abs(dayExp))}</span>`:''}
        </div>
      </div>
      ${memo?`<div class="day-memo-row" onclick="editDayMemo('${date}')">
        <span>📝</span>
        <span class="day-memo-text">${memo}</span>
      </div>`:''}
      <div class="tx-list">
        ${dTxs.map(t=>renderTxItem(t,state.multiSelect)).join('')}
      </div>
    </div>
    ${idx<sortedDates.length-1?'<div class="divider"></div>':''}`;
  });
  
  const actionBar = state.multiSelect ? `<div class="action-bar">
    <span style="font-size:var(--fs-sub);font-weight:var(--fw-h1)">${state.selectedIds.length}개 선택됨</span>
    <div style="display:flex;gap:20px">
      <button onclick="deleteSelected()" style="font-size:var(--fs-sub);font-weight:var(--fw-h1);color:#F87171;background:none;border:none;cursor:pointer">삭제</button>
      <button onclick="cancelMultiSelect()" style="font-size:var(--fs-sub);font-weight:var(--fw-h1);color:var(--gray400);background:none;border:none;cursor:pointer">취소</button>
    </div>
  </div>` : '';
  
  return `<div>${html}</div>${actionBar}<div style="height:20px"></div>`;
}

function getMonthData(year, month){
  const {start, end} = getPeriodRange(year, month);
  const txs = TRANSACTIONS.filter(t=>t.date>=start&&t.date<=end);
  const income = txs.filter(t=>t.amount>0).reduce((s,t)=>s+t.amount,0);
  const expense = txs.filter(t=>t.amount<0&&t.category!=='transfer').reduce((s,t)=>s+Math.abs(t.amount),0);
  const savings = txs.filter(t=>t.category==='saving').reduce((s,t)=>s+Math.abs(t.amount),0);
  const investment = txs.filter(t=>t.category==='investment').reduce((s,t)=>s+Math.abs(t.amount),0);
  const fixedTotal = txs.filter(t=>t.amount<0&&(t.tags||[]).some(tag=>tag.includes('고정비'))).reduce((s,t)=>s+Math.abs(t.amount),0);
  return {income,expense,savings,investment,fixedTotal,txs};
}

  const invPct = income>0?Math.round((investment/income)*100):0;
  const remPct = Math.max(0,100-expPct-savPct-invPct);

        <div class="flow-seg" style="width:${remPct}%;background:#A5B4FC"></div>

      <div class="flow-legend">

        <div><div class="legend-label">저축</div><div class="legend-val" style="color:#34D399">${savPct}%</div></div>
        <div><div class="legend-label">투자</div><div class="legend-val" style="color:#F59E0B">${invPct}%</div></div>

          <div style="display:flex;align-items:center;gap:4px;margin-top:4px">
            <span style="font-size:var(--fs-caption);font-weight:var(--fw-h1);color:${expDiff>=0?'#EF4444':'#10B981'}">${expDiff>=0?'▲':'▼'} ${fmt(Math.abs(expDiff))}원 (${Math.abs(expDiffPct)}%)</span>

window.renderCat6Chart = function(){

    const d=new Date(state.year,state.month-1-i,1);
    const txs=TRANSACTIONS.filter(t=>{const td=new Date(t.date);return td.getFullYear()===d.getFullYear()&&(td.getMonth()+1)===(d.getMonth()+1)&&t.category===catId;});
    months6.push({name:`${d.getMonth()+1}월`,amount:txs.reduce((s,t)=>s+Math.abs(t.amount),0)});

};

function renderAssetCharts(){
  const bal = accountBalances();
  if(state.assetSegment==='current'){
    const checking = ACCOUNTS.filter(a=>a.type==='checking');
    const saving = ACCOUNTS.filter(a=>a.type==='saving');
    const investment = ACCOUNTS.filter(a=>a.type==='investment');
    const totChk = checking.reduce((s,a)=>s+(bal[a.id]||0),0);
    const totSav = saving.reduce((s,a)=>s+(bal[a.id]||0),0);
    const totInv = investment.reduce((s,a)=>s+(bal[a.id]||0),0);
    const totAll = totChk+totSav+totInv;
    
    const ctx = document.getElementById('assetDonutChart');
    if(ctx&&totAll>0){
      if(state.charts.assetDonut) state.charts.assetDonut.destroy();
      state.charts.assetDonut = new Chart(ctx,{
        type:'doughnut',
        data:{
          labels:['입출금','저축','투자'],
          datasets:[{data:[totChk,totSav,totInv],backgroundColor:['#F59E0B','#95E1D3','#F38181'],borderWidth:0,hoverOffset:0}]
        },
        options:{
          cutout:'62%',
          responsive:true,
          maintainAspectRatio:true,
          plugins:{
            legend:{display:false},
            tooltip:{callbacks:{label:c=>{
              const total=c.chart.data.datasets[0].data.reduce((s,v)=>s+v,0);
              const pct=total>0?Math.round((c.raw/total)*100):0;
              return `${c.label}  ${pct}%`;
            }}}
          },
          animation:{duration:0},
          hover:{mode:null}
        }
      });
    }
  } else {
    const totNow = ACCOUNTS.reduce((s,a)=>s+(bal[a.id]||0),0);
    const data = [];
    for(let i=5;i>=0;i--){
      const d=new Date(state.year,state.month-1-i,1);
      const base=6500000;
      const growth=(5-i)*250000;
      data.push({name:`${d.getMonth()+1}월`, value:i===0?totNow:base+growth});
    }
    const ctx = document.getElementById('assetLineChart');
    if(ctx){
      if(state.charts.assetLine) state.charts.assetLine.destroy();
      state.charts.assetLine = new Chart(ctx,{
        type:'line',
        data:{
          labels:data.map(d=>d.name),
          datasets:[{data:data.map(d=>d.value),borderColor:'#6366F1',borderWidth:3,pointBackgroundColor:'#6366F1',pointRadius:5,tension:0.4,fill:true,backgroundColor:'rgba(99,102,241,.06)'}]
        },
        options:{scales:{x:{grid:{display:false},border:{display:false}},y:{display:false}},plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${fmt(c.raw)}원`}}},animation:{duration:600}}
      });
    }
  }
}

function exportCSV(){
  const headers=['날짜','내용','금액','분류','카테고리','계좌','카드','메모','태그'];
  const rows=TRANSACTIONS.map(t=>[
    t.date,t.desc,t.amount,
    t.amount>0?'수입':t.category==='transfer'?'이체':'지출',
    getcat(t.category)?.name||t.category,
    getacc(t.accountId)?.name||t.accountId,
    t.isCard?'카드':'현금',
    t.memo||'',(t.tags||[]).join('|')
  ]);
  const csv=[headers,...rows].map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`가계부_${state.year}${String(state.month).padStart(2,'0')}.csv`;a.click();
  URL.revokeObjectURL(url);
  showToast('CSV 파일이 다운로드되었어요!');
}


function importCSV(input){
  const file = input.files[0];
  if(!file){ return; }
  input.value = '';
  const isXLSX = file.name.match(/\.xlsx?$/i);
  if(isXLSX){
    if(!window.XLSX){
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
      s.onload = ()=> readXLSX(file);
      document.head.appendChild(s);
    } else { readXLSX(file); }
  } else {
    const reader = new FileReader();
    reader.onload = e => parseAndImport(e.target.result);
    reader.readAsText(file, 'UTF-8');
  }
}

function readXLSX(file){
  const reader = new FileReader();
  reader.onload = e => {
    const wb = XLSX.read(e.target.result, {type:'array'});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const csv = XLSX.utils.sheet_to_csv(ws);
    parseAndImport(csv);
  };
  reader.readAsArrayBuffer(file);
}

function parseAndImport(text){
  text = text.replace(/^\uFEFF/, '');
  const lines = text.trim().split('\n').map(l => l.trim()).filter(Boolean);
  if(lines.length < 2){ showToast('데이터가 없어요'); return; }
  const headers = lines[0].split(',').map(h => h.replace(/"/g,'').trim());
  const idx = {
    date:      headers.findIndex(h => ['날짜','date'].includes(h.toLowerCase())),
    desc:      headers.findIndex(h => ['내용','desc','description','적요'].includes(h.toLowerCase())),
    amount:    headers.findIndex(h => ['금액','amount'].includes(h.toLowerCase())),
    category:  headers.findIndex(h => ['카테고리','category'].includes(h.toLowerCase())),
    accountId: headers.findIndex(h => ['계좌','account'].includes(h.toLowerCase())),
    memo:      headers.findIndex(h => ['메모','memo','note'].includes(h.toLowerCase())),
    tags:      headers.findIndex(h => ['태그','tags'].includes(h.toLowerCase())),
  };
  if(idx.date === -1 || idx.amount === -1){
    showToast('날짜·금액 열을 찾을 수 없어요.\n내보내기로 만든 파일을 사용해주세요.');
    return;
  }
  const existing = new Set(TRANSACTIONS.map(t=>`${t.date}_${t.amount}_${t.desc}`));
  let added = 0, skipped = 0;
  lines.slice(1).forEach(line => {
    const cells = [];
    let cur = '', inQ = false;
    for(let i=0;i<line.length;i++){
      const c = line[i];
      if(c==='"'){ inQ=!inQ; }
      else if(c===','&&!inQ){ cells.push(cur.trim()); cur=''; }
      else { cur+=c; }
    }
    cells.push(cur.trim());
    const get = i => i>=0 ? (cells[i]||'').replace(/"/g,'').trim() : '';
    const date    = get(idx.date);
    const desc    = get(idx.desc) || '가져온 거래';
    const rawAmt  = get(idx.amount).replace(/,/g,'');
    const amount  = parseInt(rawAmt, 10);
    const catName = get(idx.category);
    const accName = get(idx.accountId);
    const memo    = get(idx.memo);
    const tags    = idx.tags>=0 ? get(idx.tags).split('|').filter(Boolean) : [];
    if(!date || isNaN(amount)) return;
    const key = `${date}_${amount}_${desc}`;
    if(existing.has(key)){ skipped++; return; }
    existing.add(key);
    const cat   = CATEGORIES.find(c => c.name === catName);
    const catId = cat?.id || (amount > 0 ? 'income' : 'etc');
    const acc   = ACCOUNTS.find(a => a.name === accName);
    const accId = acc?.id || ACCOUNTS[0]?.id || 'acc1';
    TRANSACTIONS.push({ id: Date.now()+Math.random(), date, desc, amount, category: catId, accountId: accId, isCard: false, memo, tags });
    added++;
  });
  TRANSACTIONS.sort((a,b) => b.date.localeCompare(a.date));
  renderContent();
  if(added > 0) showToast(`${added}건 가져왔어요!${skipped>0?' (중복 '+skipped+'건 제외)':''}`);
  else if(skipped > 0) showToast(`모두 중복 데이터예요 (${skipped}건 제외)`);
  else showToast('가져올 수 있는 데이터가 없어요');
}

window.selectCatType = function(type) {
  if (window._catFormState?.isEdit) return; // 수정 시 변경 불가

    btn.style.background = active ? 'var(--indigo50)' : '#fff';
    btn.style.color = active ? 'var(--indigo600)' : 'var(--gray500)';
  });

window.selectCatIcon = function(key) {
  window._catFormState.icon = key;
  document.querySelectorAll('[id^="catIconBtn_"]').forEach(btn => {

    btn.style.border = `2px solid ${active ? 'var(--indigo600)' : 'transparent'}`;
    btn.style.background = active ? 'var(--indigo50)' : 'var(--gray50)';
    btn.style.color = active ? 'var(--indigo600)' : 'var(--gray400)';

};

window.selectCatColor = function(color, el) {

  const { type, icon, color } = window._catFormState;

  if (isEdit) {
    const idx = CATEGORIES.findIndex(c => c.id === catId);

  // 사용 중인 거래 내역 → 기타로 재배정
  TRANSACTIONS.forEach(t => { if (t.category === catId) t.category = 'etc'; });
  FIXED_EXPENSES.forEach(f => { if (f.category === catId) f.category = 'etc'; });
  const idx = CATEGORIES.findIndex(c => c.id === catId);
  if (idx !== -1) CATEGORIES.splice(idx, 1);

  showToast(`${cat.name} 카테고리가 삭제되었어요`);

// ===== ACCOUNT DRAG & DROP =====
let _accDragId   = null;
let _accDragType = null;

function accDragStart(e, id, type) {
  _accDragId   = id;
  _accDragType = type;
  e.dataTransfer.effectAllowed = 'move';
  // 살짝 지연 후 dragging 클래스 — 스냅샷 이미지 찍힌 후에 적용
  requestAnimationFrame(() => {
    const el = document.getElementById('accRow_' + id);
    if (el) el.classList.add('dragging');
  });
}

function accDragEnd(e) {
  if (_accDragId) {
    const el = document.getElementById('accRow_' + _accDragId);
    if (el) el.classList.remove('dragging');
  }
  document.querySelectorAll('.acc-drag-row').forEach(el => {
    el.classList.remove('drag-over-top', 'drag-over-bottom');
  });
  _accDragId   = null;
  _accDragType = null;
}

function accDragOver(e, targetId, targetType) {
  e.preventDefault();
  // 같은 그룹 내에서만 허용
  if (!_accDragId || _accDragType !== targetType) {
    e.dataTransfer.dropEffect = 'none';
    return;
  }
  if (_accDragId === targetId) return;
  e.dataTransfer.dropEffect = 'move';

  document.querySelectorAll('.acc-drag-row').forEach(el => {
    el.classList.remove('drag-over-top', 'drag-over-bottom');
  });
  const rect = e.currentTarget.getBoundingClientRect();
  if (e.clientY < rect.top + rect.height / 2) {
    e.currentTarget.classList.add('drag-over-top');
  } else {
    e.currentTarget.classList.add('drag-over-bottom');
  }
}

function accDragLeave(e) {
  e.currentTarget.classList.remove('drag-over-top', 'drag-over-bottom');
}

function accDrop(e, targetId, targetType) {
  e.preventDefault();
  if (!_accDragId || _accDragId === targetId) return;
  // 같은 그룹만 허용
  if (_accDragType !== targetType) return;

  const fromIdx = ACCOUNTS.findIndex(a => a.id === _accDragId);
  const toEl    = e.currentTarget;
  const rect    = toEl.getBoundingClientRect();
  const insertBefore = e.clientY < rect.top + rect.height / 2;
  let toIdx = ACCOUNTS.findIndex(a => a.id === targetId);
  if (!insertBefore) toIdx++;

  const [moved] = ACCOUNTS.splice(fromIdx, 1);
  const newIdx  = fromIdx < toIdx ? toIdx - 1 : toIdx;
  ACCOUNTS.splice(newIdx, 0, moved);

  // order 필드 재계산 (같은 타입끼리)
  let counter = {};
  ACCOUNTS.forEach(a => {
    if (counter[a.type] === undefined) counter[a.type] = 0;
    a.order = counter[a.type]++;
  });

  refreshAccountSubview();
}

let _catDragId = null;

function catDragStart(e, id) {
  _catDragId = id;
  e.currentTarget.style.opacity = '0.4';
  e.dataTransfer.effectAllowed = 'move';
}
function catDragEnd(e) {
  e.currentTarget.style.opacity = '1';
  document.querySelectorAll('.cat-mgmt-row').forEach(el => {
    el.style.transform = '';
    el.style.borderTop = '';
    el.style.borderBottom = '';
  });
  _catDragId = null;
}
function catDragOver(e, targetId) {
  e.preventDefault();
  if (_catDragId === targetId) return;
  document.querySelectorAll('.cat-mgmt-row').forEach(el => { el.style.borderTop = ''; el.style.borderBottom = ''; });
  const rect = e.currentTarget.getBoundingClientRect();
  const midY = rect.top + rect.height / 2;
  if (e.clientY < midY) {
    e.currentTarget.style.borderTop = '2px solid var(--indigo500)';
  } else {
    e.currentTarget.style.borderBottom = '2px solid var(--indigo500)';
  }
  e.dataTransfer.dropEffect = 'move';
}
function catDragLeave(e) {
  e.currentTarget.style.borderTop = '';
  e.currentTarget.style.borderBottom = '';
}
function catDrop(e, targetId, type) {
  e.preventDefault();
  if (!_catDragId || _catDragId === targetId) return;

  const fromIdx = CATEGORIES.findIndex(c => c.id === _catDragId);
  const toEl = e.currentTarget;
  const rect = toEl.getBoundingClientRect();
  const insertBefore = e.clientY < rect.top + rect.height / 2;
  let toIdx = CATEGORIES.findIndex(c => c.id === targetId);
  if (!insertBefore) toIdx++;

  const [moved] = CATEGORIES.splice(fromIdx, 1);
  const newIdx = fromIdx < toIdx ? toIdx - 1 : toIdx;
  CATEGORIES.splice(newIdx, 0, moved);

  refreshCategorySubview();
  if (state.tab === 'settings') renderContent();
}

  const html = `
  <div id="fxModal" class="overlay" style="z-index:110" onclick="if(event.target===this)removeModal('fxModal')"></div>

    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2 class="sheet-title" style="font-size:var(--fs-h2)">${isEdit ? '고정지출 수정' : '고정지출 추가'}</h2>
      <button class="btn-close" onclick="removeModal('fxModal')">닫기</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:20px">

      <!-- 이름 -->
      <div class="form-group">
        <label class="form-label">항목 이름</label>
        <input id="fxName" type="text" class="form-input" placeholder="예: 넷플릭스" value="${fx?.name || ''}">
      </div>

      <!-- 금액 -->
      <div class="form-group">
        <label class="form-label">월 납부액</label>
        <div class="amount-wrap">
          <input id="fxAmount" type="text" inputmode="numeric" class="form-input amount"
            placeholder="0" value="${fx?.amount ? fx.amount.toLocaleString() : ''}">
          <span class="amount-won">원</span>
        </div>
      </div>

      <!-- 날짜 -->
      <div class="form-group">
        <label class="form-label">매월 결제일</label>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:var(--fs-caption);font-weight:var(--fw-h1);color:var(--gray400)">매월</span>
          <input id="fxDay" type="number" min="1" max="31" class="num-input"
            value="${fx?.day || 1}" style="width:64px">
          <span style="font-size:var(--fs-caption);font-weight:var(--fw-h1);color:var(--gray400)">일</span>
        </div>
      </div>

      <!-- 카테고리 -->
      <div class="form-group">
        <label class="form-label">카테고리</label>
        <select id="fxCategory" class="form-select">
          ${catOptions}
        </select>
      </div>

      <!-- 계좌 -->
      <div class="form-group">
        <label class="form-label">출금 계좌</label>
        <select id="fxAccount" class="form-select">
          <option value="">선택 안 함</option>
          ${accOptions}
        </select>
      </div>

      <div class="btn-row" style="padding-top:4px">
        <button class="btn-secondary" onclick="removeModal('fxModal')">취소</button>
        <button class="btn-primary" onclick="saveFx('${fxId || ''}')">
          ${isEdit ? '수정 완료' : '추가하기'}
        </button>
      </div>
    </div>
  </div>`;

  document.body.insertAdjacentHTML('beforeend', html);

  // 금액 포맷팅
  const amtInput = document.getElementById('fxAmount');
  if (amtInput) {
    amtInput.addEventListener('input', function () {
      const raw = this.value.replace(/,/g, '');
      if (!isNaN(Number(raw)) || raw === '') this.value = raw ? Number(raw).toLocaleString() : '';
    });
  }
}

function saveFx(fxId) {
  const name = (document.getElementById('fxName')?.value || '').trim();
  if (!name) { showToast('항목 이름을 입력해주세요'); return; }

  const rawAmt = (document.getElementById('fxAmount')?.value || '').replace(/,/g, '');
  const amount = parseInt(rawAmt) || 0;
  if (amount < 1) { showToast('금액을 입력해주세요'); return; }

  const day = Math.max(1, Math.min(31, parseInt(document.getElementById('fxDay')?.value) || 1));
  const category = document.getElementById('fxCategory')?.value || 'etc';
  const accountId = document.getElementById('fxAccount')?.value || '';

  const isEdit = fxId !== '';

  if (!isEdit) {
    // 신규 추가 — 팝업 없이 바로 저장
    FIXED_EXPENSES.push({ id: 'fx' + Date.now(), name, amount, day, category, accountId });
    removeModal('fxModal');
    autoGenerateFixedExpenses();
    refreshFixedExpenseSubview();
    if (state.tab === 'settings') renderContent(); else render();
    showToast('고정지출이 추가되었어요!');
    return;
  }

  // 수정 — 입력값을 임시 저장 후 적용 범위 팝업 표시
  window._pendingFxEdit = { fxId, name, amount, day, category, accountId };
  removeModal('fxModal');
  showFxEditScopePopup(fxId, name, amount);
}

function applyFxEdit(includeThisMonth) {
  const { fxId, name, amount, day, category, accountId } = window._pendingFxEdit || {};
  if (!fxId) { removeModal('fxScopeModal'); return; }

  // 고정지출 목록 업데이트
  const idx = FIXED_EXPENSES.findIndex(f => f.id === fxId);
  if (idx !== -1) {
    FIXED_EXPENSES[idx] = { ...FIXED_EXPENSES[idx], name, amount, day, category, accountId };
  }

  // 이번 달 자동생성 거래도 갱신
  if (includeThisMonth) {
    const thisYM = todayStr.slice(0, 7);
    TRANSACTIONS.forEach(t => {
      if (t.fxSourceId === fxId && t.date.slice(0, 7) === thisYM) {
        t.desc     = name;
        t.amount   = -Math.abs(amount);
        t.category = category;
        t.accountId = accountId;
      }
    });
    showToast('이번 달 거래도 함께 수정됐어요!');
  } else {
    showToast('다음 달부터 적용돼요!');
  }

  window._pendingFxEdit = null;
  removeModal('fxScopeModal');
  autoGenerateFixedExpenses();
  refreshFixedExpenseSubview();
  if (state.tab === 'settings') renderContent(); else render();
}

  const fx = FIXED_EXPENSES.find(f => f.id === fxId);

  const idx = FIXED_EXPENSES.findIndex(f => f.id === fxId);

function saveCard(cardId){
  const name = (document.getElementById('cardName')?.value||'').trim();
  if(!name){ showToast('카드명을 입력해주세요'); return; }
  const paymentDay   = Math.max(1,Math.min(31,parseInt(document.getElementById('cardPayDay')?.value)||15));
  const startOffset  = Math.max(1,Math.min(31,parseInt(document.getElementById('cardStartOffset')?.value)||2));
  const endOffset    = Math.max(1,Math.min(31,parseInt(document.getElementById('cardEndOffset')?.value)||1));
  const linkedAccountId = document.getElementById('cardLinkedAcc')?.value||'';
  const isEdit = cardId !== '';
  if(isEdit){
    const idx = CARDS.findIndex(c=>c.id===cardId);
    if(idx===-1) return;
    CARDS[idx] = {...CARDS[idx], name, paymentDay, startOffset, endOffset, linkedAccountId};
    showToast('카드가 수정되었어요!');
  } else {
    CARDS.push({ id:'card'+Date.now(), name, paymentDay, startOffset, endOffset, linkedAccountId });
    showToast('카드가 추가되었어요!');
  }
  removeModal('cardModal');
  refreshCardSubview();
  if(state.tab==='settings') renderContent();
}

/**
 * getCardBillingPeriod(cardId, year, month)
 * 카드의 startOffset / endOffset 기준으로
 * 해당 월 청구분의 이용기간 {start, end} 을 반환한다.
 *
 * 예) startOffset=2, endOffset=1, year=2026, month=3
 *   → { start:'2026-02-02', end:'2026-03-01' }
 *   → 이 기간 내 isCard=true 거래가 3월 결제분
 */
function getCardBillingPeriod(cardId, year, month){
  const card = CARDS.find(c=>c.id===cardId);
  if(!card) return null;

  const so = card.startOffset || 2;   // 전월 n일
  const eo = card.endOffset   || 1;   // 당월 m일

  // 전월 계산
  let prevYear = year, prevMonth = month - 1;
  if(prevMonth < 1){ prevMonth = 12; prevYear--; }

  const maxPrev = new Date(prevYear, prevMonth, 0).getDate();
  const maxCurr = new Date(year, month, 0).getDate();

  const start = `${prevYear}-${String(prevMonth).padStart(2,'0')}-${String(Math.min(so,maxPrev)).padStart(2,'0')}`;
  const end   = `${year}-${String(month).padStart(2,'0')}-${String(Math.min(eo,maxCurr)).padStart(2,'0')}`;

  return { start, end };
}

/**
 * getCardMonthlyTotal(cardId, year, month)
 * 해당 카드의 이용기간 내 isCard=true 거래 합산 (절대값)
 */
function getCardMonthlyTotal(cardId, year, month){
  const period = getCardBillingPeriod(cardId, year, month);
  if(!period) return 0;
  return TRANSACTIONS
    .filter(t => t.isCard && t.accountId === CARDS.find(c=>c.id===cardId)?.linkedAccountId
                 && t.date >= period.start && t.date <= period.end && t.amount < 0)
    .reduce((s,t)=>s+Math.abs(t.amount), 0);
}

function executeDeleteCard(cardId){
  const card = CARDS.find(c=>c.id===cardId);
  if(!card){ removeModal('delCardModal'); return; }
  for(let i=INSTALLMENTS.length-1;i>=0;i--){
    if(INSTALLMENTS[i].cardId===cardId) INSTALLMENTS.splice(i,1);
  }
  const idx = CARDS.findIndex(c=>c.id===cardId);
  if(idx!==-1) CARDS.splice(idx,1);
  removeModal('delCardModal');
  showToast(`${card.name}이 삭제되었어요`);
  refreshCardSubview();
  if(state.tab==='settings') renderContent();
}

  <div id="instModal" class="overlay" style="z-index:150" onclick="if(event.target===this)removeModal('instModal')"></div>
  <div id="instModalSheet" class="sheet" style="z-index:160;max-height:82vh">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2 class="sheet-title" style="font-size:var(--fs-h2)">${isEdit?'할부 수정':'할부 추가'}</h2>
      <button class="btn-close" onclick="removeModal('instModal')">닫기</button>
    </div>
    <div style="font-size:var(--fs-caption);font-weight:var(--fw-h1);color:var(--indigo600);background:var(--indigo50);border-radius:10px;padding:8px 12px;margin-bottom:4px">💳 ${card?.name||''}</div>
    <div style="display:flex;flex-direction:column;gap:20px;margin-top:16px">
      <div class="form-group">
        <label class="form-label">항목명</label>
        <input id="instName" type="text" class="form-input" placeholder="예: 냉장고 할부" value="${inst?.name||''}">
      </div>
      <div class="form-grid2">
        <div class="form-group">
          <label class="form-label">총 할부 개월</label>
          <div style="display:flex;align-items:center;gap:6px">
            <input id="instTotal" type="number" min="1" max="60" class="form-input" placeholder="12" value="${inst?.totalMonths||''}">
            <span style="font-size:var(--fs-caption);font-weight:var(--fw-h1);color:var(--gray400);white-space:nowrap">개월</span>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">납부 완료 회차</label>
          <div style="display:flex;align-items:center;gap:6px">
            <input id="instPaid" type="number" min="0" class="form-input" placeholder="0" value="${inst?.paidMonths||0}">
            <span style="font-size:var(--fs-caption);font-weight:var(--fw-h1);color:var(--gray400);white-space:nowrap">회</span>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">월 납부액</label>
        <div class="amount-wrap">
          <input id="instAmt" type="text" inputmode="numeric" class="form-input amount" placeholder="0" value="${inst?.monthlyAmount?inst.monthlyAmount.toLocaleString():''}">
          <span class="amount-won">원</span>
        </div>
      </div>
      <div class="btn-row" style="padding-top:4px">
        <button class="btn-secondary" onclick="removeModal('instModal')">취소</button>
        <button class="btn-primary" onclick="saveInstallment('${instId||''}','${cardId}')">
          ${isEdit?'수정 완료':'추가하기'}
        </button>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
  const amtInput = document.getElementById('instAmt');
  if(amtInput){
    amtInput.addEventListener('input',function(){
      const raw=this.value.replace(/,/g,'');
      if(!isNaN(Number(raw))||raw==='') this.value=raw?Number(raw).toLocaleString():'';
    });
  }
}

function saveInstallment(instId, cardId){
  const name = (document.getElementById('instName')?.value||'').trim();
  if(!name){ showToast('항목명을 입력해주세요'); return; }
  
  // ✨ 수정됨: 숫자로 정확히 변환하고, 1 미만이나 NaN을 철저히 방어
  const totalMonths = parseInt(document.getElementById('instTotal')?.value, 10);
  if(isNaN(totalMonths) || totalMonths < 2){
    showToast('총 할부 개월 수는 2 이상이어야 합니다.');
    return;
  }
  
  const paidMonths = Math.min(totalMonths, Math.max(0, parseInt(document.getElementById('instPaid')?.value)||0));
  const monthlyAmount = parseInt((document.getElementById('instAmt')?.value||'0').replace(/,/g,''))||0;
  if(monthlyAmount<1){ showToast('월 납부액을 입력해주세요'); return; }
  const isEdit = instId !== '';
  if(isEdit){
    const idx = INSTALLMENTS.findIndex(i=>i.id===instId);
    if(idx===-1) return;
    INSTALLMENTS[idx] = {...INSTALLMENTS[idx], name, totalMonths, paidMonths, monthlyAmount};
    showToast('할부가 수정되었어요!');
  } else {
    INSTALLMENTS.push({ id:'inst'+Date.now(), cardId, name, totalMonths, paidMonths, monthlyAmount });
    showToast('할부가 추가되었어요!');
  }
  removeModal('instModal');
  refreshCardSubview();
  if(state.tab==='assets') renderContent();
}

function deleteInstallment(instId){
  const inst = INSTALLMENTS.find(i=>i.id===instId);
  if(!inst) return;
  if(!confirm(`"${inst.name}" 할부를 삭제할까요?`)) return;
  const idx = INSTALLMENTS.findIndex(i=>i.id===instId);
  if(idx!==-1) INSTALLMENTS.splice(idx,1);
  showToast('할부가 삭제되었어요');
  refreshCardSubview();
  if(state.tab==='assets') renderContent();
}


// ===== ACCOUNT MANAGEMENT =====
const ACCOUNT_COLORS = [
  '#FFE66D','#4ECDC4','#95E1D3','#F38181','#A8E6CF',
  '#B8B8FF','#F4A96A','#FF8B94','#C3B1E1','#6C63FF',
  '#FFA07A','#98D8C8','#DDA0DD','#87CEEB','#F0E68C'
];

function renderAccountList(){
  const TYPE_GROUPS = [
    {type:'checking',  label:'입출금 계좌'},
    {type:'saving',    label:'예·적금 계좌'},
    {type:'investment',label:'투자 계좌'},
    {type:'cash',      label:'현금'},
  ];
  const bal = accountBalances();

  // 드래그 핸들 SVG (6-dot grip)
  const gripSvg = `<svg width="14" height="20" viewBox="0 0 14 20" fill="none">
    <circle cx="4" cy="4"  r="1.6" fill="currentColor"/>
    <circle cx="10" cy="4"  r="1.6" fill="currentColor"/>
    <circle cx="4" cy="10" r="1.6" fill="currentColor"/>
    <circle cx="10" cy="10" r="1.6" fill="currentColor"/>
    <circle cx="4" cy="16" r="1.6" fill="currentColor"/>
    <circle cx="10" cy="16" r="1.6" fill="currentColor"/>
  </svg>`;

  return TYPE_GROUPS.map(({type, label}) => {
    const group = ACCOUNTS
      .filter(a => a.type === type)
      .sort((a,b) => (a.order??99) - (b.order??99));
    if(group.length === 0) return '';

    const rows = group.map(a => {
      const currentBal = bal[a.id] || 0;
      return `<div class="acc-drag-row"
          id="accRow_${a.id}"
          data-id="${a.id}"
          data-type="${type}"
          draggable="true"
          ondragstart="accDragStart(event,'${a.id}','${type}')"
          ondragover="accDragOver(event,'${a.id}','${type}')"
          ondragleave="accDragLeave(event)"
          ondragend="accDragEnd(event)"
          ondrop="accDrop(event,'${a.id}','${type}')">

        <!-- 드래그 핸들 -->
        <div class="acc-drag-handle" title="드래그하여 순서 변경">${gripSvg}</div>

        <!-- 계좌 색상 점 + 정보 -->
        <div style="display:flex;align-items:center;gap:12px;flex:1;min-width:0">
          <div style="width:40px;height:40px;border-radius:14px;background:${a.color}1a;color:${a.color};
                      display:flex;align-items:center;justify-content:center;flex-shrink:0">
            ${luIcon('wallet',18)}
          </div>
          <div style="min-width:0">
            <div style="font-size:var(--fs-sub);font-weight:var(--fw-h1);color:var(--gray800);
                        white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${a.name}</div>
            <div style="font-size:var(--fs-caption);color:var(--gray400);margin-top:2px;font-weight:var(--fw-amt)">
              ${fmt(currentBal)}원
            </div>
          </div>
        </div>

        <!-- 버튼 -->
        <div style="display:flex;gap:6px;flex-shrink:0">
          <button onclick="openAccountModal('${a.id}')"
            style="font-size:var(--fs-caption);font-weight:var(--fw-h1);color:var(--indigo600);background:var(--indigo50);
                   border:none;cursor:pointer;padding:6px 12px;border-radius:10px">수정</button>
          <button onclick="confirmDeleteAccount('${a.id}')"
            style="font-size:var(--fs-caption);font-weight:var(--fw-h1);color:var(--red500);background:#FEF2F2;
                   border:none;cursor:pointer;padding:6px 12px;border-radius:10px">삭제</button>
        </div>
      </div>`;
    }).join('');

    return `
      <div style="margin-bottom:24px">
        <div style="font-size:var(--fs-caption);font-weight:var(--fw-h1);color:var(--gray400);
                    letter-spacing:.06em;padding:0 4px;margin-bottom:8px">
          ${label} <span style="color:var(--gray300)">(${group.length}개)</span>
        </div>
        <div class="card" style="padding:4px 0;overflow:visible"
             data-group="${type}">
          ${rows}
        </div>
      </div>`;
  }).join('');
}

function refreshAccountSubview(){
  const sc = document.querySelector('.subview-content');
  if(!sc) return;
  sc.innerHTML = renderAccountList()+'<button class="btn-primary" onclick="openAccountModal(null)" style="margin-top:4px">+ 계좌 추가</button>';
}

/* 계좌 추가/수정 모달 */
function openAccountModal(accId){
  const isEdit = accId !== null;
  const acc = isEdit ? ACCOUNTS.find(a=>a.id===accId) : null;

  // 현재 잔액 계산 (수정 시)
  const bal = accountBalances();
  const currentBal = isEdit ? (bal[accId]||0) : 0;

  const TYPE_OPTIONS = [
    {v:'checking',l:'입출금'},
    {v:'saving',l:'예·적금'},
    {v:'investment',l:'투자'},
    {v:'cash',l:'현금'},
  ];

  const colorSwatches = ACCOUNT_COLORS.map(c=>`
    <div onclick="selectAccColor('${c}',this)"
      style="width:32px;height:32px;border-radius:50%;background:${c};cursor:pointer;
             border:3px solid ${(acc?.color||ACCOUNT_COLORS[0])===c?'var(--gray800)':'transparent'};
             transition:border .15s;flex-shrink:0"
      data-color="${c}"></div>`).join('');

  const html=`
  <div id="accModal" class="overlay" style="z-index:110" onclick="if(event.target===this)removeModal('accModal')"></div>
  <div id="accModalSheet" class="sheet" style="z-index:120;max-height:88vh">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2 class="sheet-title" style="font-size:var(--fs-h2)">${isEdit?'계좌 수정':'계좌 추가'}</h2>
      <button class="btn-close" onclick="removeModal('accModal')">닫기</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:20px">

      <!-- 이름 -->
      <div class="form-group">
        <label class="form-label">계좌명</label>
        <input id="accName" type="text" class="form-input" placeholder="예: 카카오뱅크" value="${acc?.name||''}">
      </div>

      <!-- 종류 -->
      <div class="form-group">
        <label class="form-label">종류</label>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
          ${TYPE_OPTIONS.map(t=>`
            <button id="accType_${t.v}" onclick="selectAccType('${t.v}')"
              style="padding:10px 4px;border-radius:12px;border:2px solid ${(acc?.type||'checking')===t.v?'var(--indigo600)':'var(--gray200)'};
                     background:${(acc?.type||'checking')===t.v?'var(--indigo50)':'#fff'};
                     font-size:var(--fs-caption);font-weight:var(--fw-h1);color:${(acc?.type||'checking')===t.v?'var(--indigo600)':'var(--gray500)'};
                     cursor:pointer;transition:all .15s;font-family:var(--font)">
              ${t.l}
            </button>`).join('')}
        </div>
      </div>

      <!-- 잔액 -->
      <div class="form-group">
        <label class="form-label">${isEdit?'현재 잔액':'초기 잔액'}</label>
        ${isEdit
          ? `<div style="background:var(--gray50);border-radius:16px;padding:12px 16px;font-size:var(--fs-sub);font-weight:var(--fw-h1);color:var(--gray500)">
               ${fmt(currentBal)}원
               <span style="font-size:var(--fs-micro);font-weight:var(--fw-caption);color:var(--gray400);margin-left:8px">(거래 내역 반영 금액 · 수정 불가)</span>
             </div>`
          : `<div class="amount-wrap">
               <input id="accBalance" type="text" inputmode="numeric" class="form-input amount" placeholder="0" value="">
               <span class="amount-won">원</span>
             </div>`
        }
      </div>

      <!-- 색상 -->
      <div class="form-group">
        <label class="form-label">색상</label>
        <div id="accColorWrap" style="display:flex;flex-wrap:wrap;gap:10px;padding:4px 0">
          ${colorSwatches}
        </div>
      </div>

      <!-- 예·적금 전용 옵션 (조건부) -->
      <div id="savingOptions" style="display:${(acc?.type||'checking')==='saving'?'flex':'none'};flex-direction:column;gap:16px">
        <div class="form-group">
          <label class="form-label">만기일</label>
          <input id="accMaturity" type="date" class="form-input" value="${acc?.maturity||''}">
        </div>
        <div class="form-grid2">
          <div class="form-group">
            <label class="form-label">금리 (%)</label>
            <input id="accRate" type="number" step="0.1" class="form-input" placeholder="0.0" value="${acc?.rate||''}">

            <label class="form-label">월 납입액</label>

      <div class="btn-row" style="padding-top:4px">

  const balInput = document.getElementById('accBalance');
  if(balInput){

        this.value=raw?n.toLocaleString():'';
      }
    });

  // 선택된 타입/색상 상태 저장용

  };

window.selectAccType = function(type){
  window._accFormState.type = type;
  const opts=['checking','saving','investment','cash'];
  opts.forEach(t=>{
    const btn=document.getElementById(`accType_${t}`);
    if(!btn) return;
    const active = t===type;
    btn.style.border=`2px solid ${active?'var(--indigo600)':'var(--gray200)'}`;
    btn.style.background=active?'var(--indigo50)':'#fff';
    btn.style.color=active?'var(--indigo600)':'var(--gray500)';
  });
  const so=document.getElementById('savingOptions');
  if(so) so.style.display=type==='saving'?'flex':'none';
};

window.selectAccColor = function(color, el){
  window._accFormState.color = color;
  document.querySelectorAll('#accColorWrap div').forEach(d=>{
    d.style.border=`3px solid ${d.dataset.color===color?'var(--gray800)':'transparent'}`;
  });
};

function saveAccount(accId){
  const name=(document.getElementById('accName')?.value||'').trim();
  if(!name){ showToast('계좌명을 입력해주세요'); return; }

  const type = window._accFormState?.type||'checking';
  const color = window._accFormState?.color||ACCOUNT_COLORS[0];
  const isEdit = accId !== '';

  if(isEdit){
    const idx = ACCOUNTS.findIndex(a=>a.id===accId);
    if(idx===-1) return;
    ACCOUNTS[idx] = {
      ...ACCOUNTS[idx],
      name, type, color,
      ...(type==='saving' ? {
        maturity: document.getElementById('accMaturity')?.value||'',
        rate: parseFloat(document.getElementById('accRate')?.value||0),
        monthly: parseInt((document.getElementById('accMonthly')?.value||'0').replace(/,/g,''))||0
      } : {})
    };
    showToast('계좌가 수정되었어요!');
  } else {
    const rawBal=(document.getElementById('accBalance')?.value||'').replace(/,/g,'');
    const balance = parseInt(rawBal, 10);
    if(isNaN(balance)){
      showToast('초기 잔액을 입력해주세요');
      return;
    }
    const newAcc = {
      id: 'acc'+Date.now(),
      name, type, color, balance,
      ...(type==='saving' ? {
        maturity: document.getElementById('accMaturity')?.value||'',
        rate: parseFloat(document.getElementById('accRate')?.value||0),
        monthly: parseInt((document.getElementById('accMonthly')?.value||'0').replace(/,/g,''))||0
      } : {})
    };
    ACCOUNTS.push(newAcc);
    showToast('계좌가 추가되었어요!');
  }

  removeModal('accModal');
  refreshAccountSubview();
  // 설정 탭도 갱신
  if(state.tab==='settings') renderContent();
}

/* 계좌 삭제 — 잔액 이전 확인 */
function confirmDeleteAccount(accId){
  const acc = ACCOUNTS.find(a=>a.id===accId);
  if(!acc) return;

  const bal = accountBalances();
  const currentBal = bal[accId]||0;
  const hasTx = TRANSACTIONS.some(t=>t.accountId===accId||t.toAccountId===accId);

  removeModal('delAccModal');

  // 다른 계좌 목록 (이전 대상)
  const others = ACCOUNTS.filter(a=>a.id!==accId);

  const warningHtml = currentBal!==0
    ? `<div style="background:#FEF2F2;border-radius:16px;padding:14px 16px;margin-bottom:20px">
         <div style="font-size:var(--fs-caption);font-weight:var(--fw-h1);color:var(--red500);margin-bottom:4px">⚠️ 잔액이 남아있어요</div>
         <div style="font-size:var(--fs-sub);font-weight:var(--fw-h1);color:var(--red600)">현재 잔액: ${fmt(currentBal)}원</div>
         <div style="font-size:var(--fs-caption);color:var(--gray500);margin-top:4px">삭제 전 다른 계좌로 잔액을 이전하거나, 이전 없이 바로 삭제할 수 있어요.</div>
       </div>`
    : `<div style="background:var(--gray50);border-radius:16px;padding:14px 16px;margin-bottom:20px">
         <div style="font-size:var(--fs-caption);color:var(--gray500)">잔액이 0원입니다.</div>
       </div>`;

  const txWarning = hasTx
    ? `<div style="background:#FFF7ED;border-radius:16px;padding:12px 16px;margin-bottom:20px">
         <div style="font-size:var(--fs-caption);font-weight:var(--fw-h1);color:#D97706">📋 거래 내역 안내</div>
         <div style="font-size:var(--fs-caption);color:var(--gray500);margin-top:2px">이 계좌의 거래 내역은 삭제되지 않고 보존됩니다.</div>
       </div>` : '';

  const transferSection = (currentBal!==0 && others.length>0)
    ? `<div class="form-group" style="margin-bottom:20px">
         <label class="form-label">잔액 이전할 계좌 선택 (선택사항)</label>
         <select id="transferTargetAcc" class="form-select">
           <option value="">이전 안 함 (잔액 포기)</option>
           ${others.map(o=>`<option value="${o.id}">${o.name} (현재 ${fmt(bal[o.id]||0)}원)</option>`).join('')}
         </select>
       </div>` : '';

  const html=`
  <div id="delAccModal" class="overlay" style="z-index:130" onclick="if(event.target===this)removeModal('delAccModal')"></div>
  <div id="delAccSheet" class="sheet" style="z-index:140">
    <div class="sheet-handle"></div>
    <div style="margin-bottom:20px">
      <h2 style="font-size:var(--fs-h2);font-weight:var(--fw-h1);margin-bottom:6px">계좌 삭제</h2>
      <p style="font-size:var(--fs-sub);color:var(--gray500)"><strong style="color:var(--gray800)">${acc.name}</strong> 계좌를 삭제할까요?</p>
    </div>
    ${warningHtml}
    ${txWarning}
    ${transferSection}
    <div style="display:flex;flex-direction:column;gap:10px">
      ${(currentBal!==0 && others.length>0)
        ? `<button onclick="executeDeleteAccount('${accId}', true)" style="width:100%;padding:14px;background:var(--indigo600);color:#fff;border:none;border-radius:14px;font-size:var(--fs-sub);font-weight:var(--fw-h1);cursor:pointer;font-family:var(--font)">
             잔액 이전 후 삭제
           </button>` : ''}
      <button onclick="executeDeleteAccount('${accId}', false)" style="width:100%;padding:14px;background:#FEF2F2;color:var(--red500);border:none;border-radius:14px;font-size:var(--fs-sub);font-weight:var(--fw-h1);cursor:pointer;font-family:var(--font)">
        ${currentBal!==0?'잔액 포기하고 삭제':'삭제하기'}
      </button>
      <button onclick="removeModal('delAccModal')" style="width:100%;padding:14px;background:var(--gray100);color:var(--gray600);border:none;border-radius:14px;font-size:var(--fs-sub);font-weight:var(--fw-h1);cursor:pointer;font-family:var(--font)">
        취소
      </button>
    </div>
  </div>`;

  document.body.insertAdjacentHTML('beforeend', html);
}

function executeDeleteAccount(accId, doTransfer){
  const acc = ACCOUNTS.find(a=>a.id===accId);
  if(!acc){ removeModal('delAccModal'); return; }

  if(doTransfer){
    const targetId = document.getElementById('transferTargetAcc')?.value;
    if(!targetId){
      showToast('이전할 계좌를 선택해주세요');
      return;
    }
    if(targetId===accId){
      showToast('같은 계좌로는 이전할 수 없어요');
      return;
    }
    const bal = accountBalances();
    const transferAmt = bal[accId]||0;
    if(transferAmt!==0){
      // 이체 거래 기록 추가
      TRANSACTIONS.unshift({
        id: Date.now(),
        date: todayStr,
        time: new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}),
        desc: `${acc.name} → ${ACCOUNTS.find(a=>a.id===targetId)?.name||''} 잔액 이전`,
        amount: -Math.abs(transferAmt),
        category: 'transfer',
        accountId: accId,
        toAccountId: targetId,
        isCard: false,
        memo: '계좌 삭제로 인한 잔액 이전',
        tags: ['#계좌이전']
      });
    }
  }

  // 계좌 제거
  const idx = ACCOUNTS.findIndex(a=>a.id===accId);
  if(idx!==-1) ACCOUNTS.splice(idx,1);

  removeModal('delAccModal');
  showToast(`${acc.name} 계좌가 삭제되었어요`);
  refreshAccountSubview();
  if(state.tab==='settings') renderContent();
}

function onCategoryChange(el){
  formData.category = el.value;

  const categoryName = el.options[el.selectedIndex].text;

  if(!formData.desc){
    formData.desc = categoryName;

    const descInput = document.querySelector('input[placeholder="어디서 쓰셨나요?"]');
    if(descInput){
      descInput.value = categoryName;
    }
  }
}

function onAmountInput(el){
  const raw=el.value.replace(/,/g,'');
  if(!isNaN(Number(raw))||raw===''){
    formData.amount=raw;
    el.value=raw?Number(raw).toLocaleString():'';
  }
}

function showDescSuggest(el){
  const val=el.value.toLowerCase();
  const ac=document.getElementById('descAutocomplete');
  if(!val||!ac){return;}
  const matches=[...new Set(TRANSACTIONS.map(t=>t.desc))].filter(d=>d&&d.toLowerCase().includes(val)&&d!==el.value);
  if(matches.length===0){ac.style.display='none';return;}
  ac.innerHTML=matches.slice(0,5).map(m=>`<div class="autocomplete-item" onclick="formData.desc='${m}';document.querySelector('.form-input[placeholder=\\'어디서 쓰셨나요?\\']').value='${m}';document.getElementById('descAutocomplete').style.display='none'">${m}</div>`).join('');
  ac.style.display='block';
}

function saveTransaction(keepOpen){
  const saveBtn = document.querySelector('#addModalSheet .btn-primary');
  const keepOpenBtn = document.querySelector('#addModalSheet .btn-secondary');
  if(saveBtn && saveBtn.disabled) return;
  if(saveBtn) saveBtn.disabled = true;
  if(keepOpenBtn) keepOpenBtn.disabled = true;

  if(!formData.amount||!formData.desc){
    showToast('내용과 금액을 입력해주세요');
    if(saveBtn) saveBtn.disabled = false;
    if(keepOpenBtn) keepOpenBtn.disabled = false;
    return;
  }
  if(!formData.accountId){
    showToast('자산을 선택해주세요');
    if(saveBtn) saveBtn.disabled = false;
    if(keepOpenBtn) keepOpenBtn.disabled = false;
    return;
  }
  if(formData.type!=='transfer'&&!formData.category){
    showToast('카테고리를 선택해주세요');
    if(saveBtn) saveBtn.disabled = false;
    if(keepOpenBtn) keepOpenBtn.disabled = false;
    return;
  }
  if(formData.type==='transfer'&&(!formData.toAccountId||formData.accountId===formData.toAccountId)){
    showToast('이체 계좌를 다시 확인해주세요');
    if(saveBtn) saveBtn.disabled = false;
    if(keepOpenBtn) keepOpenBtn.disabled = false;
    return;
  }
  
  const tags=(formData.tags||'').split(' ').map(t=>t.trim()).filter(Boolean).map(t=>t.startsWith('#')?t:`#${t}`);
  const amt=Number(String(formData.amount).replace(/,/g,''));
  const selectedAcc=ACCOUNTS.find(a=>a.id===formData.accountId);
  const isCard=selectedAcc?.type==='card';
  
  const newTx={
    id:editingId||Date.now(),
    date:formData.date,time:formData.time,desc:formData.desc,
    amount:(formData.type==='expense' || formData.type==='transfer') ? -Math.abs(amt) : Math.abs(amt),
    category:formData.type==='transfer'?'transfer':formData.category,
    accountId:formData.accountId,
    toAccountId:formData.type==='transfer'?formData.toAccountId:undefined,
    isCard:isCard||formData.isCard,
    memo:formData.memo,tags
  };
  
  if(editingId){
    TRANSACTIONS=TRANSACTIONS.map(t=>t.id===editingId?newTx:t);
    saveTransactionToSupabase(newTx);
    showToast('수정되었어요!');
  } else {
    TRANSACTIONS.unshift(newTx);
    saveTransactionToSupabase(newTx);
    showToast('저장되었어요!');
  }
  
  removeModal('addModal');removeModal('addModalSheet');
  keepOpen = true;
  
  if(keepOpen&&!editingId){
    formData={...formData,amount:'',desc:'',category:'',memo:'',tags:''};
    editingId=null;
    if(saveBtn) saveBtn.disabled = false;
    if(keepOpenBtn) keepOpenBtn.disabled = false;
    setTimeout(()=>showAddModalUI(),100);
  } else {
    editingId=null;
    render();
  }
}

  if(!confirm('정말 삭제할까요?')) return;
