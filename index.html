function renderDatePickerMonths(){
  const grid=document.getElementById('monthGrid');
  if(!grid) return;
  const now=new Date();
  grid.innerHTML=Array.from({length:12},(_,i)=>{
    const m=i+1;
    const isFuture=state.year>now.getFullYear()||(state.year===now.getFullYear()&&m>now.getMonth()+1);
    return`<button onclick="${isFuture?'':(`state.month=${m};renderDatePickerMonths()`)}" style="padding:8px;border-radius:12px;border:none;cursor:${isFuture?'not-allowed':'pointer'};font-size:var(--fs-sub);font-weight:var(--fw-h1);font-family:var(--font);background:${state.month===m&&!isFuture?'var(--indigo600)':'var(--gray50)'};color:${state.month===m&&!isFuture?'#fff':isFuture?'var(--gray200)':'var(--gray400)'}">${m}</button>`;
  }).join('');
  // update year buttons
  const yearBtns = document.querySelectorAll('#datePickerContent button');
  yearBtns.forEach((btn,i)=>{
    if(i<3){
      const y=[2024,2025,2026][i];
      btn.style.background=state.year===y?'var(--indigo600)':'var(--gray50)';
      btn.style.color=state.year===y?'#fff':'var(--gray400)';
    }
  });
}

// ===== AUTO-GENERATE FIXED EXPENSES =====

/**
 * 오늘 날짜 기준으로, 각 고정지출의 결제일이 지난 달을 전부 순회해서
 * 아직 TRANSACTIONS에 없으면 자동 생성한다.
 * 생성된 거래에는 fxSourceId 필드가 붙어 있어서 추적·중복방지에 사용된다.
 *
 * 생성 범위: 앱 최초 실행 기준 6개월 전 ~ 오늘 포함 당월
 */
function autoGenerateFixedExpenses() {
  const now = new Date(todayStr);
  const todayDay = now.getDate();   // 오늘이 몇 일인지
  const todayYM  = todayStr.slice(0, 7); // "YYYY-MM"

  // 이미 자동생성된 거래를 (fxSourceId + "YYYY-MM") 키로 빠르게 조회
  const existingKeys = new Set(
    TRANSACTIONS
      .filter(t => t.fxSourceId)
      .map(t => t.fxSourceId + '_' + t.date.slice(0, 7))
  );

  let added = 0;

  FIXED_EXPENSES.forEach(fx => {
    // 6개월 전부터 이번 달까지 순회
    for (let offset = 5; offset >= 0; offset--) {
      const d = new Date(now.getFullYear(), now.getMonth() - offset, 1);
      const yyyy = d.getFullYear();
      const mm   = String(d.getMonth() + 1).padStart(2, '0');
      const ym   = `${yyyy}-${mm}`;

      // 이번 달이면 결제일이 오늘 이전(포함)인지 확인
      if (ym === todayYM && fx.day > todayDay) continue;

      const key = fx.id + '_' + ym;
      if (existingKeys.has(key)) continue; // 이미 있음
      if (deletedFxKeys.has(key)) continue; // 수동 삭제됨 → 재생성 안 함

      // 결제일 날짜 (월말 초과 방지: 2월 31일 → 2월 28일)
      const maxDay  = new Date(yyyy, d.getMonth() + 1, 0).getDate();
      const realDay = Math.min(fx.day, maxDay);
      const dateStr = `${ym}-${String(realDay).padStart(2, '0')}`;

      TRANSACTIONS.push({
        id:         Date.now() + Math.random(), // 유일 ID
        date:       dateStr,
        desc:       fx.name,
        amount:     -Math.abs(fx.amount),       // 항상 지출
        category:   fx.category,
        accountId:  fx.accountId,
        isCard: ACCOUNTS.find(a => a.id === fx.accountId)?.type === 'card',
        memo:       '',
        tags:       ['#고정비'],
        fxSourceId: fx.id,                      // ← 추적용 태그
        autoFixed:  true,                       // ← 자동생성 표시
      });

      existingKeys.add(key); // 이번 루프에서 중복 방지
      added++;
    }
  });

  // 날짜 내림차순 재정렬
  if (added > 0) {
    TRANSACTIONS.sort((a, b) => b.date.localeCompare(a.date));
  }
  return added;
}

function showLoginScreen() {

  document.getElementById('appRoot').style.display = 'none';
}

function hideLoginScreen() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appRoot').style.display = 'block';

  await sb.auth.signOut();
  currentUser = null;

async function loadTransactionsFromSupabase() {
  if (!currentUser) return;
  const { data, error } = await sb
    .from('transactions')
    .select('*')
    .eq('user_id', currentUser.id)
    .order('date', { ascending: false });

  }));
  hideLoginScreen();

  if (!currentUser) return;
  const row = {
    id: tx.id,
    user_id: currentUser.id,
    date: tx.date,
    memo_desc: tx.desc,
    amount: tx.amount,
    category: tx.category,
    account_id: tx.accountId,
    is_card: tx.isCard || false,
    memo: tx.memo || '',
    tags: JSON.stringify(tx.tags || []),
    type: tx.amount < 0 ? 'expense' : 'income',
  };

  const { error } = await sb
    .from('transactions')
    .delete()
    .eq('id', id)
    .eq('user_id', currentUser.id);
  if (error) showToast('삭제 실패: ' + error.message);
}
